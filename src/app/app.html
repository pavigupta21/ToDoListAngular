<h3>Todo</h3>

<input [(ngModel)]="newTask">
<button (click)="add()">ADD</button>

<ul>
  <li *ngFor="let t of tasks; let i =index">
    <p>{{tasks[i]}}</p>
    <input [(ngModel)]="temp[i]">
    <button (click)="tasks[i]=temp[i]">save</button>
    <button (click)="del(i)">Delete</button>
  </li>
</ul>
